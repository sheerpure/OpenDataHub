<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTechHub | Secure Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.25s ease; }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 p-6 flex flex-col hidden md:flex sticky top-0 h-screen">
        <div class="flex items-center space-x-3 mb-10">
            <div class="w-9 h-9 bg-slate-900 rounded-lg flex items-center justify-center shadow-lg text-white font-bold">FH</div>
            <span class="text-2xl font-extrabold tracking-tight">FinTech<span class="text-slate-400 font-medium">Hub</span></span>
        </div>
        
        <nav class="space-y-1.5 flex-grow">
            <a href="#" class="flex items-center space-x-3 px-4 py-2.5 bg-slate-100 rounded-lg font-semibold text-slate-950">📊<span>Analytics Dashboard</span></a>
        </nav>

        <div class="mt-8 mb-6 bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">My Accounts</h4>
            <div id="accountBalances" class="space-y-2 text-sm font-medium text-slate-700">
                <div class="text-xs text-slate-400 italic">No accounts linked.</div>
            </div>
            <button onclick="alert('Account creation API pending...')" class="w-full text-xs font-bold text-slate-600 bg-slate-100 py-2 rounded-lg hover:bg-slate-200">+ New Account</button>
        </div>

        <div class="bg-slate-900 p-5 rounded-2xl text-white">
            <div class="font-bold text-sm">User: Sheer</div>
            <button onclick="logout()" class="text-xs text-red-400 font-bold mt-2 hover:underline">TERMINATE SESSION</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-10 px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-slate-800">Financial Overview</h1>
            <button onclick="toggleModal()" class="px-5 py-2.5 text-sm font-bold text-white bg-slate-900 rounded-lg hover:bg-slate-800 shadow-md">+ Add Entry</button>
        </header>

        <div class="max-w-7xl mx-auto px-8 py-10 space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Net Worth</p>
                    <div class="text-3xl font-black text-slate-900" id="statBalance">$0</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Total Income</p>
                    <div class="text-3xl font-black text-emerald-600" id="statIncome">+$0</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-red-500">
                    <p class="text-[10px] font-bold text-red-400 uppercase tracking-widest mb-1">Total Expense</p>
                    <div class="text-3xl font-black text-red-600" id="statExpense">-$0</div>
                </div>
            </section>

            <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-[350px] flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Asset Allocation</h3>
                    <div class="flex-grow relative"><canvas id="expenseChart"></canvas></div>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-[350px] flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Cash Flow Distribution</h3>
                    <div class="flex-grow relative"><canvas id="trendChart"></canvas></div>
                </div>
            </section>

            <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-10">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b border-slate-100">
                        <tr>
                            <th class="px-8 py-3">Description</th>
                            <th class="px-8 py-3">Category</th>
                            <th class="px-8 py-3">Amount</th>
                            <th class="px-8 py-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="text-sm divide-y divide-slate-100 font-medium">
                        </tbody>
                </table>
            </section>
        </div>
    </main>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-40"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50">
            <div class="modal-content py-6 px-8">
                <div class="flex justify-between items-center pb-5">
                    <p class="text-xl font-bold">New Ledger Entry</p>
                    <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-900 p-2 rounded-full hover:bg-slate-100">✕</button>
                </div>
                <form id="transactionForm" class="space-y-4">
                    
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Target Account</label>
                        <select id="accountSelect" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 text-sm" required>
                            <option value="" disabled selected>Select an account...</option>
                            </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Description</label>
                        <input type="text" id="desc" placeholder="e.g., Office Supplies" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Amount ($)</label>
                            <input type="number" id="amt" placeholder="0.00" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Type</label>
                            <select id="type" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none text-sm">
                                <option value="income">Income</option>
                                <option value="expense" selected>Expense</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Category</label>
                        <input type="text" id="cat" placeholder="e.g., Groceries" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none">
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-4 hover:bg-slate-800 transition-all shadow-lg">Submit Transaction</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let expenseChart = null, trendChart = null;

        /** Core App Initialization */
        async function initDashboard() {
            if (!token) { alert("Auth Required: Login via /api/v1/docs"); return; }
            try {
                // Fetching all data in parallel for efficiency
                const [dashRes, listRes, acctRes] = await Promise.all([
                    fetch('/api/v1/dashboard', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/v1/transactions', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/v1/accounts', { headers: { 'Authorization': `Bearer ${token}` } }) // [NEW] Fetch accounts
                ]);

                if (!acctRes.ok) throw new Error("Missing Account API");

                const stats = await dashRes.json();
                const txList = await listRes.json();
                const acctList = await acctRes.json(); // [NEW] Account data

                // 1. Update UI Components
                updateKPIs(stats);
                updateAccountUI(acctList); // [NEW] Populate accounts in Sidebar and Modal
                
                // 2. Render Charts
                renderDoughnut(stats.total_income, stats.total_expense);
                renderBar(stats.total_income, stats.total_expense);
                
                // 3. Populate Ledger Table
                renderTable(txList);

            } catch (err) { alert("Initialization Error: " + err.message); }
        }

        function updateKPIs(data) {
            document.getElementById('statBalance').innerText = `$${data.balance.toLocaleString()}`;
            document.getElementById('statIncome').innerText = `+$${data.total_income.toLocaleString()}`;
            document.getElementById('statExpense').innerText = `-$${data.total_expense.toLocaleString()}`;
        }

        /** [NEW] Populates Sidebar Balances and Modal Dropdown */
        function updateAccountUI(accounts) {
            const sidebarHtml = accounts.map(a => `
                <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                    <span class="text-slate-900">${a.name}</span>
                    <span class="font-bold ${a.balance >= 0 ? 'text-slate-900' : 'text-red-500'}">
                        $${a.balance.toLocaleString()}
                    </span>
                </div>
            `).join('');
            document.getElementById('accountBalances').innerHTML = sidebarHtml || '<div class="text-xs text-slate-400 italic">No accounts linked.</div>';

            const selectHtml = '<option value="" disabled selected>Select an account...</option>' + 
                accounts.map(a => `<option value="${a.id}">${a.name} ($${a.balance.toLocaleString()})</option>`).join('');
            document.getElementById('accountSelect').innerHTML = selectHtml;
        }

        function renderTable(txs) {
            const table = document.getElementById('transactionTable');
            table.innerHTML = txs.map(t => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-4 font-semibold text-slate-700">${t.description}</td>
                    <td class="px-8 py-4 text-[10px] text-slate-400 uppercase tracking-widest">${t.category || 'Uncategorized'}</td>
                    <td class="px-8 py-4 font-bold ${t.transaction_type==='income'?'text-emerald-600':'text-red-500'}">
                        ${t.transaction_type==='income'?'+':'-'}$${t.amount.toLocaleString()}
                    </td>
                    <td class="px-8 py-4 text-right">
                        <button onclick="deleteTx(${t.id})" class="text-xs text-red-400 font-bold hover:text-red-600">DELETE</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteTx(id) {
            if (!confirm("Are you sure you want to delete this transaction? The account balance will be adjusted.")) return;
            const res = await fetch(`/api/v1/transactions/${id}`, {
                method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) initDashboard();
        }

        /** Chart Logic: maintainAspectRatio is FALSE for fixed-height responsiveness */
        function renderDoughnut(inc, exp) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChart) expenseChart.destroy();
            expenseChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Expense', 'Net Profit'],
                    datasets: [{ data: [exp, Math.max(0, inc-exp)], backgroundColor: ['#ef4444', '#10b981'], borderWidth: 0, hoverOffset: 15 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        function renderBar(inc, exp) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Cash Inflow vs Outflow'],
                    datasets: [
                        { label: 'Income', data: [inc], backgroundColor: '#10b981', borderRadius: 8, barThickness: 50 },
                        { label: 'Expense', data: [exp], backgroundColor: '#f1f5f9', borderRadius: 8, barThickness: 50 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        /** [UPDATED] Form Submission with account_id */
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                account_id: parseInt(document.getElementById('accountSelect').value), // [NEW] Account ID
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amt').value),
                category: document.getElementById('cat').value,
                transaction_type: document.getElementById('type').value
            };
            const res = await fetch('/api/v1/transactions', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { toggleModal(); initDashboard(); document.getElementById('transactionForm').reset(); }
            else { alert("Submission Error. Please verify input."); }
        });

        function toggleModal() {
            const modal = document.querySelector('#modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
        }

        function logout() { localStorage.removeItem('token'); location.reload(); }
        window.onload = initDashboard;
    </script>
</body>
</html>
