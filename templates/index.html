<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTechHub | Secure Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.25s ease; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex">

    <aside class="w-64 bg-white border-r border-slate-200 p-6 flex flex-col hidden md:flex sticky top-0 h-screen">
        <div class="flex items-center space-x-3 mb-10">
            <div class="w-9 h-9 bg-slate-900 rounded-lg flex items-center justify-center shadow-lg text-white font-bold">FH</div>
            <span class="text-2xl font-extrabold tracking-tight">FinTech<span class="text-slate-400 font-medium">Hub</span></span>
        </div>
        <nav class="space-y-1.5 flex-grow">
            <a href="#" class="flex items-center space-x-3 px-4 py-2.5 bg-slate-100 rounded-lg font-semibold">📊<span>Analytics</span></a>
        </nav>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
            <div class="font-bold text-sm">User: Sheer</div>
            <button onclick="logout()" class="text-xs text-red-500 font-bold mt-2 hover:underline">LOGOUT</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-10 px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800">Financial Overview</h1>
            <button onclick="toggleModal()" class="px-5 py-2.5 text-sm font-bold text-white bg-slate-900 rounded-lg hover:bg-slate-800 shadow-md">+ Add Entry</button>
        </header>

        <div class="max-w-7xl mx-auto px-8 py-10 space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Balance</p>
                    <div class="text-3xl font-black text-slate-900" id="statBalance">$0</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Total Income</p>
                    <div class="text-3xl font-black text-emerald-600" id="statIncome">+$0</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-red-400 uppercase tracking-widest mb-1">Total Expense</p>
                    <div class="text-3xl font-black text-red-600" id="statExpense">-$0</div>
                </div>
            </section>

            <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-[350px] flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Asset Allocation</h3>
                    <div class="flex-grow relative"><canvas id="expenseChart"></canvas></div>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-[350px] flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Cash Flow Analysis</h3>
                    <div class="flex-grow relative"><canvas id="trendChart"></canvas></div>
                </div>
            </section>

            <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-10">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b border-slate-100">
                        <tr>
                            <th class="px-8 py-3">Description</th>
                            <th class="px-8 py-3">Category</th>
                            <th class="px-8 py-3">Amount</th>
                            <th class="px-8 py-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="text-sm divide-y divide-slate-100 font-medium">
                        </tbody>
                </table>
            </section>
        </div>
    </main>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-40"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50">
            <div class="modal-content py-6 px-8">
                <div class="flex justify-between items-center pb-5">
                    <p class="text-xl font-bold">New Transaction</p>
                    <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-900">✕</button>
                </div>
                <form id="transactionForm" class="space-y-4">
                    <input type="text" id="desc" placeholder="Description" class="w-full p-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-slate-900" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="amt" placeholder="Amount" class="w-full p-2.5 border rounded-xl outline-none" required>
                        <select id="type" class="w-full p-2.5 border rounded-xl outline-none">
                            <option value="income">Income</option>
                            <option value="expense" selected>Expense</option>
                        </select>
                    </div>
                    <input type="text" id="cat" placeholder="Category" class="w-full p-2.5 border rounded-xl outline-none">
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-4 hover:bg-slate-800 transition-all">Submit Transaction</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let expenseChart = null, trendChart = null;

        /** Initializing application state */
        async function initDashboard() {
            if (!token) { console.error("Missing Token"); return; }
            try {
                const [dashRes, listRes] = await Promise.all([
                    fetch('/api/v1/dashboard', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/v1/transactions', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const stats = await dashRes.json();
                const list = await listRes.json();

                updateKPIs(stats);
                renderDoughnut(stats.total_income, stats.total_expense);
                renderBar(stats.total_income, stats.total_expense);
                renderTable(list);
            } catch (err) { alert("Session Error. Please verify token."); }
        }

        function updateKPIs(data) {
            document.getElementById('statBalance').innerText = `$${data.balance.toLocaleString()}`;
            document.getElementById('statIncome').innerText = `+$${data.total_income.toLocaleString()}`;
            document.getElementById('statExpense').innerText = `-$${data.total_expense.toLocaleString()}`;
        }

        function renderTable(txs) {
            const table = document.getElementById('transactionTable');
            table.innerHTML = txs.map(t => `
                <tr class="hover:bg-slate-50">
                    <td class="px-8 py-4 font-semibold text-slate-700">${t.description}</td>
                    <td class="px-8 py-4 text-[10px] text-slate-400 uppercase tracking-widest">${t.category}</td>
                    <td class="px-8 py-4 font-bold ${t.transaction_type==='income'?'text-emerald-600':'text-red-500'}">
                        ${t.transaction_type==='income'?'+':'-'}$${t.amount.toLocaleString()}
                    </td>
                    <td class="px-8 py-4 text-right">
                        <button onclick="deleteTx(${t.id})" class="text-red-400 hover:text-red-600 transition-all font-bold">DELETE</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteTx(id) {
            if (!confirm("Confirm Delete?")) return;
            const res = await fetch(`/api/v1/transactions/${id}`, {
                method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) initDashboard();
        }

        /** Chart Logic: maintainAspectRatio is FALSE for responsive height control */
        function renderDoughnut(inc, exp) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChart) expenseChart.destroy();
            expenseChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Expense', 'Profit'],
                    datasets: [{ data: [exp, Math.max(0, inc-exp)], backgroundColor: ['#ef4444', '#10b981'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        function renderBar(inc, exp) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Inflow vs Outflow'],
                    datasets: [
                        { label: 'Income', data: [inc], backgroundColor: '#10b981', borderRadius: 8, barThickness: 50 },
                        { label: 'Expense', data: [exp], backgroundColor: '#f1f5f9', borderRadius: 8, barThickness: 50 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, border: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amt').value),
                category: document.getElementById('cat').value,
                transaction_type: document.getElementById('type').value
            };
            const res = await fetch('/api/v1/transactions', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { toggleModal(); initDashboard(); document.getElementById('transactionForm').reset(); }
        });

        function toggleModal() {
            const modal = document.querySelector('#modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
        }

        function logout() { localStorage.removeItem('token'); location.reload(); }
        window.onload = initDashboard;
    </script>
</body>
</html>
