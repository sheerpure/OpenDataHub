<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTechHub | Secure Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.25s ease; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 p-6 flex flex-col hidden md:flex sticky top-0 h-screen">
        <div class="flex items-center space-x-3 mb-10">
            <div class="w-9 h-9 bg-slate-900 rounded-lg flex items-center justify-center shadow-lg text-white font-bold">FH</div>
            <span class="text-2xl font-extrabold tracking-tight">FinTech<span class="text-slate-400 font-medium">Hub</span></span>
        </div>
        
        <nav class="space-y-1.5 flex-grow">
            <a href="#" onclick="selectAccountFromSidebar('all')" class="flex items-center space-x-3 px-4 py-2.5 bg-slate-100 rounded-lg font-semibold text-slate-950">📊<span>Analytics Dashboard</span></a>
        </nav>

        <div class="mt-8 mb-6 bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
            <div class="flex justify-between items-center">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">My Accounts</h4>
                <button onclick="selectAccountFromSidebar('all')" class="text-[9px] font-bold text-indigo-500 hover:underline">SHOW ALL</button>
            </div>
            <div id="accountBalances" class="space-y-2">
                <div class="text-xs text-slate-400 italic text-center py-2">Loading accounts...</div>
            </div>
            <button onclick="toggleAccountModal()" class="w-full text-xs font-bold text-slate-600 bg-white border border-slate-200 py-2 rounded-lg hover:bg-slate-50 transition-colors shadow-sm">+ New Account</button>
        </div>

        <div class="bg-slate-900 p-5 rounded-2xl text-white">
            <div class="font-bold text-sm" id="currentUserDisplay">User: Loading...</div>
            <button onclick="logout()" class="text-xs text-red-400 font-bold mt-2 hover:underline text-left uppercase">Terminate Session</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-10 px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold tracking-tight text-slate-800">Financial Overview</h1>
                <div class="relative">
                    <select id="headerAccountFilter" onchange="applyFilter(); updateAccountUI(allAccounts);" 
                        class="bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-slate-900 appearance-none pr-8 cursor-pointer shadow-sm">
                        <option value="all">ALL ACCOUNTS</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-2 flex items-center text-slate-400">
                        <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                </div>
            </div>
            <button onclick="toggleModal()" class="px-5 py-2.5 text-sm font-bold text-white bg-slate-900 rounded-lg hover:bg-slate-800 shadow-md transition-all">+ Add Entry</button>
        </header>

        <div class="max-w-7xl mx-auto px-8 py-10 space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Net Worth</p>
                    <div class="text-3xl font-black text-slate-900" id="statBalance">$0</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Total Income</p>
                    <div class="text-3xl font-black text-emerald-600" id="statIncome">+$0</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-red-500">
                    <p class="text-[10px] font-bold text-red-400 uppercase tracking-widest mb-1">Total Expense</p>
                    <div class="text-3xl font-black text-red-600" id="statExpense">-$0</div>
                </div>
            </section>

            <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-[380px] flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Expense Allocation</h3>
                    <div class="flex-grow relative"><canvas id="categoryChart"></canvas></div>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-[380px] flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Cash Flow Distribution</h3>
                    <div class="flex-grow relative"><canvas id="trendChart"></canvas></div>
                </div>
            </section>

            <section class="bg-white px-8 py-4 rounded-t-2xl border border-slate-200 border-b-0 shadow-sm flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center space-x-3">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">From</label>
                        <input type="date" id="startDate" class="text-xs font-semibold bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:ring-1 focus:ring-slate-900">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">To</label>
                        <input type="date" id="endDate" class="text-xs font-semibold bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:ring-1 focus:ring-slate-900">
                    </div>
                    <button onclick="applyFilter()" class="mt-3.5 bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-200 transition-all uppercase tracking-widest">
                        Apply Filter
                    </button>
                </div>
                
                <button onclick="exportCSV()" class="mt-3.5 flex items-center space-x-2 bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-emerald-100 transition-all border border-emerald-100 uppercase tracking-widest">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span>Export CSV</span>
                </button>
            </section>

            <section class="bg-white rounded-b-2xl border border-slate-200 shadow-sm overflow-hidden mb-10">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b border-slate-100">
                        <tr>
                            <th class="px-8 py-3 cursor-pointer hover:text-slate-900 transition-colors" onclick="toggleSort('date')">Date ↕</th>
                            <th class="px-8 py-3">Description</th>
                            <th class="px-8 py-3">Category</th>
                            <th class="px-8 py-3 cursor-pointer hover:text-slate-900 transition-colors text-right" onclick="toggleSort('amount')">Amount ↕</th>
                            <th class="px-8 py-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="text-sm divide-y divide-slate-100 font-medium"></tbody>
                </table>
            </section>
        </div>
    </main>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-40"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto">
            <div class="modal-content py-6 px-8">
                <div class="flex justify-between items-center pb-5">
                    <p class="text-xl font-bold">New Ledger Entry</p>
                    <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-900 p-2 rounded-full hover:bg-slate-100">✕</button>
                </div>
                <form id="transactionForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Target Account</label>
                        <select id="accountSelect" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 text-sm" required></select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Transaction Date</label>
                        <input type="date" id="txDate" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Description</label>
                        <input type="text" id="desc" placeholder="e.g., Lunch" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Amount ($)</label>
                            <input type="number" step="0.01" id="amt" placeholder="0.00" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Type</label>
                            <select id="type" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none text-sm">
                                <option value="income">Income</option>
                                <option value="expense" selected>Expense</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Category</label>
                        <input type="text" id="cat" placeholder="e.g., Food" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none">
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-4 hover:bg-slate-800 transition-all shadow-lg">Submit Transaction</button>
                </form>
            </div>
        </div>
    </div>

    <div id="accountModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-40"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50">
            <div class="modal-content py-6 px-8">
                <div class="flex justify-between items-center pb-5">
                    <p class="text-xl font-bold">Create New Account</p>
                    <button onclick="toggleAccountModal()" class="text-slate-400 hover:text-slate-900 p-2 rounded-full hover:bg-slate-100">✕</button>
                </div>
                <form id="accountForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Account Name</label>
                        <input type="text" id="accName" placeholder="e.g., Bank of Taiwan" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Initial Balance ($)</label>
                        <input type="number" step="0.01" id="accBalance" value="0.00" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Account Type</label>
                        <select id="accType" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none text-sm">
                            <option value="Checking">Checking</option>
                            <option value="Savings">Savings</option>
                            <option value="Cash">Cash</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-4 hover:bg-slate-800 transition-all shadow-lg">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let categoryChart = null, trendChart = null;
        let allTransactions = [], allAccounts = [], allStats = {};
        let currentSort = 'date_desc'; // Default sorting mode

        async function checkAuth() {
            if (!token) { window.location.href = '/login'; return; }
            try {
                const resp = await fetch('/api/v1/accounts', { headers: { 'Authorization': `Bearer ${token}` } });
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('currentUserDisplay').innerText = `User: ${payload.sub}`;
            } catch { localStorage.removeItem('token'); window.location.href = '/login'; }
        }

        /**
         * Initializes the dashboard by fetching core statistics and account data.
         * Ensures all data is loaded before triggering the initial filter/render.
         */
        async function initDashboard() {
            await checkAuth();
            try {
                // Fetch both dashboard summary and accounts list in parallel
                const [dashRes, acctRes] = await Promise.all([
                    fetch('/api/v1/dashboard', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/v1/accounts', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                
                // Parse JSON responses
                allStats = await dashRes.json();
                allAccounts = await acctRes.json();
                
                // Update Sidebar and Dropdowns with fetched accounts
                updateAccountUI(allAccounts); 
                
                // CRITICAL FIX: Use 'await' to ensure applyFilter finishes its
                // internal logic (including chart rendering) before proceeding.
                await applyFilter();
                
            } catch (err) { 
                console.error("Initialization Error:", err); 
            }
        }

        async function applyFilter() {
            const accId = document.getElementById('headerAccountFilter').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            // Build URL with sort and filters
            let url = `/api/v1/transactions?sort_by=${currentSort}&`;
            if (accId !== 'all') url += `account_id=${accId}&`;
            if (start) url += `start_date=${start}&`;
            if (end) url += `end_date=${end}`;

            try {
                const txRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const filteredTxs = await txRes.json();
                
                let stats = { balance: 0, total_income: 0, total_expense: 0 };
                if (accId === 'all') {
                    stats.balance = allAccounts.reduce((sum, acc) => sum + acc.balance, 0);
                } else {
                    const active = allAccounts.find(a => a.id === parseInt(accId));
                    stats.balance = active ? active.balance : 0;
                }

                filteredTxs.forEach(t => {
                    if (t.transaction_type === 'income') stats.total_income += t.amount;
                    else stats.total_expense += t.amount;
                });

                updateKPIs(stats);
                renderTable(filteredTxs);
                renderBar(stats.total_income, stats.total_expense);
                renderCategoryChart(generateCategoryData(filteredTxs));
            } catch (err) { console.error("Filter Error:", err); }
        }

        /** Trigger Sort Logic and Re-fetch */
        function toggleSort(type) {
            if (type === 'date') {
                currentSort = (currentSort === 'date_desc') ? 'date_asc' : 'date_desc';
            } else if (type === 'amount') {
                currentSort = (currentSort === 'amount_desc') ? 'amount_asc' : 'amount_desc';
            }
            applyFilter();
        }

        function exportCSV() {
            const accId = document.getElementById('headerAccountFilter').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            let url = `/api/v1/transactions/export?`;
            if (accId !== 'all') url += `account_id=${accId}&`;
            if (start) url += `start_date=${start}&`;
            if (end) url += `end_date=${end}`;

            fetch(url, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.blob()).then(blob => {
                    const a = document.createElement("a");
                    a.href = window.URL.createObjectURL(blob);
                    a.download = `Report_${new Date().toISOString().split('T')[0]}.csv`;
                    a.click();
                });
        }

            function renderTable(txs) {
            const tableBody = document.getElementById('transactionTable');
            
            // Check if txs is a valid array, if not, show an empty state
            if (!txs || !Array.isArray(txs) || txs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 italic">No transactions found for the selected period.</td></tr>`;
                return;
            }

            tableBody.innerHTML = txs.map(t => {
                // Safety 1: Handle potential null dates
                let displayDate = "N/A";
                if (t.date) {
                    const dateObj = new Date(t.date);
                    // Format: 03/18 (MM/DD) - No time as requested
                    displayDate = dateObj.toLocaleDateString('zh-TW', { 
                        month: '2-digit', 
                        day: '2-digit' 
                    });
                }

                // Safety 2: Ensure amount is treated as a number
                const rawAmount = parseFloat(t.amount) || 0;
                const formattedAmount = rawAmount.toLocaleString();
                const typeColor = t.transaction_type === 'income' ? 'text-emerald-600' : 'text-red-500';
                const prefix = t.transaction_type === 'income' ? '+' : '-';

                // Safety 3: Category fallback
                const categoryLabel = t.category ? t.category.toUpperCase() : "GENERAL";

                return `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                        <td class="px-8 py-4 text-xs text-slate-400 font-mono">${displayDate}</td>
                        <td class="px-8 py-4 font-semibold text-slate-700">${t.description || 'No Description'}</td>
                        <td class="px-8 py-4 text-[10px] text-slate-400 uppercase tracking-widest">${categoryLabel}</td>
                        <td class="px-8 py-4 font-bold text-right ${typeColor}">
                            ${prefix}$${formattedAmount}
                        </td>
                        <td class="px-8 py-4 text-right">
                            <button onclick="deleteTx(${t.id})" class="text-xs text-red-300 hover:text-red-600 font-bold transition-colors">
                                DELETE
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateKPIs(data) {
            document.getElementById('statBalance').innerText = `$${(data.balance || 0).toLocaleString()}`;
            document.getElementById('statIncome').innerText = `+$${(data.total_income || 0).toLocaleString()}`;
            document.getElementById('statExpense').innerText = `-$${(data.total_expense || 0).toLocaleString()}`;
        }

        function updateAccountUI(accounts) {
            const filterValue = document.getElementById('headerAccountFilter').value;
            const sidebarHtml = accounts.map(a => {
                const isSelected = filterValue === String(a.id);
                return `
                    <div class="group flex justify-between items-center p-2.5 rounded-xl transition-all ${isSelected ? 'bg-slate-200 ring-1 ring-slate-300' : 'hover:bg-white hover:shadow-sm'}">
                        <div onclick="selectAccountFromSidebar('${a.id}')" class="flex-grow cursor-pointer">
                            <div class="text-slate-900 font-bold text-xs truncate w-32">${a.name}</div>
                            <div class="text-sm font-black ${a.balance >= 0 ? 'text-slate-700' : 'text-red-500'}">$${a.balance.toLocaleString()}</div>
                        </div>
                        <button onclick="deleteAccount(${a.id}, '${a.name}')" class="opacity-0 group-hover:opacity-100 p-1.5 text-slate-300 hover:text-red-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                    </div>
                `;
            }).join('');
            document.getElementById('accountBalances').innerHTML = sidebarHtml || '<div class="text-xs text-slate-400 italic text-center">No accounts.</div>';
            
            const filterDropdown = document.getElementById('headerAccountFilter');
            filterDropdown.innerHTML = '<option value="all">ALL ACCOUNTS</option>' + accounts.map(a => `<option value="${a.id}">${a.name.toUpperCase()}</option>`).join('');
            filterDropdown.value = filterValue;

            document.getElementById('accountSelect').innerHTML = accounts.map(a => `<option value="${a.id}">${a.name} ($${a.balance.toLocaleString()})</option>`).join('');
        }

        function selectAccountFromSidebar(id) {
            document.getElementById('headerAccountFilter').value = id;
            applyFilter();
            updateAccountUI(allAccounts);
        }

        async function deleteAccount(id, name) {
            if (!confirm(`Delete "${name}" and all records?`)) return;
            const res = await fetch(`/api/v1/accounts/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { if (document.getElementById('headerAccountFilter').value === String(id)) document.getElementById('headerAccountFilter').value = 'all'; initDashboard(); }
        }

        function generateCategoryData(txs) {
            const categories = {};
            txs.filter(t => t.transaction_type === 'expense').forEach(t => {
                const c = t.category || 'General';
                categories[c] = (categories[c] || 0) + t.amount;
            });
            return Object.keys(categories).map(key => ({ category: key, amount: categories[key] }));
        }

        function renderCategoryChart(data) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: data.length ? data.map(d => d.category) : ["No Data"], datasets: [{ data: data.length ? data.map(d => d.amount) : [0.1], backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        function renderBar(inc, exp) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: ['Summary'], datasets: [{ label: 'Income', data: [inc], backgroundColor: '#10b981', borderRadius: 6 }, { label: 'Expense', data: [exp], backgroundColor: '#cbd5e1', borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } }
            });
        }

        document.getElementById('accountForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { name: document.getElementById('accName').value, balance: parseFloat(document.getElementById('accBalance').value), account_type: document.getElementById('accType').value };
            const res = await fetch('/api/v1/accounts', { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { toggleAccountModal(); initDashboard(); document.getElementById('accountForm').reset(); }
            else { const err = await res.json(); alert(err.detail || "Error"); }
        };

        document.getElementById('transactionForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { 
                account_id: parseInt(document.getElementById('accountSelect').value), 
                description: document.getElementById('desc').value, 
                amount: parseFloat(document.getElementById('amt').value), 
                category: document.getElementById('cat').value, 
                transaction_type: document.getElementById('type').value, 
                date: document.getElementById('txDate').value 
            };
            const res = await fetch('/api/v1/transactions', { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { toggleModal(); initDashboard(); document.getElementById('transactionForm').reset(); }
        };

        async function deleteTx(id) {
            if (!confirm("Are you sure?")) return;
            const res = await fetch(`/api/v1/transactions/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) initDashboard();
        }

        /** Enhanced Toggle Modal with Date Defaulting */
        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            
            // Default date to Today when opening
            if (!modal.classList.contains('opacity-0')) {
                document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            }
        }

        function toggleAccountModal() { document.getElementById('accountModal').classList.toggle('opacity-0'); document.getElementById('accountModal').classList.toggle('pointer-events-none'); }
        function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }

        window.onload = () => {
            const now = new Date();
            document.getElementById('startDate').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('endDate').value = now.toISOString().split('T')[0];
            initDashboard();
        };
    </script>
</body>
</html>
