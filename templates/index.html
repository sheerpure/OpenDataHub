<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDataHub | 專業研究資料平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#0f172a] min-h-screen">

    <div id="loginModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-900 mb-6">歡迎回來</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">帳號</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-400 outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-2 rounded-lg font-medium hover:bg-slate-800 transition-colors">登入</button>
                <button onclick="toggleModal()" class="w-full text-sm text-slate-500 hover:text-slate-700">取消</button>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-40 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-slate-900 rounded-md flex items-center justify-center">
                    <span class="text-white font-bold text-sm">DH</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900">OpenDataHub</span>
            </div>
            <div id="navAuth" class="flex items-center space-x-4">
                <button onclick="toggleModal()" class="text-sm font-medium text-slate-600 hover:text-slate-900">登入</button>
                <button class="px-4 py-2 text-sm font-medium text-white bg-slate-900 rounded-md hover:bg-slate-800">上傳資料</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">探索研究數據的價值</h1>
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" oninput="handleSearch()" class="w-full pl-10 pr-4 py-4 bg-white border border-slate-200 rounded-xl shadow-sm focus:ring-2 focus:ring-slate-400 outline-none" placeholder="搜尋關鍵字...">
            </div>
        </header>
        <div id="resultsContainer" class="space-y-4"></div>
    </main>

    <script>
        // 1. 彈窗控制
        function toggleModal() {
            document.getElementById('loginModal').classList.toggle('hidden');
        }

        // 2. 登入邏輯 (牽線！)
        async function handleLogin() {
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    body: formData // OAuth2 標準要求用 FormData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token); // 存入感應卡
                    alert('登入成功！');
                    location.reload(); // 重新整理網頁更新狀態
                } else {
                    alert('帳號或密碼錯誤');
                }
            } catch (error) {
                console.error('登入失敗:', error);
            }
        }

        // 3. 檢查登入狀態
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('navAuth').innerHTML = `
                    <span class="text-sm text-slate-600">歡迎, 使用者</span>
                    <button onclick="logout()" class="text-sm font-medium text-red-500">登出</button>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        // 4. 搜尋邏輯
        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if (q.length < 1) return;
            const response = await fetch(`/api/v1/datasets?q=${q}`);
            const result = await response.json();
            if (result.status === 'success') {
                document.getElementById('resultsContainer').innerHTML = result.data.map(item => `
                    <div class="p-6 bg-white border border-slate-200 rounded-lg shadow-sm">
                        <h3 class="font-bold text-slate-900">${item.title}</h3>
                        <p class="text-sm text-slate-500 mt-2">${item.description}</p>
                    </div>
                `).join('');
            }
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
