<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - FinTechHub | Secure Ledger</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        body { font-family: 'Inter', sans-serif; }

    </style>

</head>

<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-10 rounded-3xl border border-slate-200 shadow-2xl w-full max-w-md">

        <div class="flex flex-col items-center mb-8">

            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg text-white font-bold text-xl mb-4">FH</div>

            <h2 class="text-3xl font-black tracking-tight text-slate-900">Create Account</h2>

            <p class="text-slate-400 text-sm font-medium mt-2 text-center">Join FinTechHub to manage your assets with enterprise-grade security.</p>

        </div>



        <div id="error-msg" class="hidden bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mb-6 text-xs font-bold uppercase tracking-widest text-center"></div>

       

        <form id="register-form" class="space-y-4">

            <div>

                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Username</label>

                <input type="text" id="username" required placeholder="Pick a unique username"

                    class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all text-sm font-semibold">

            </div>



            <div>

                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Email Address</label>

                <input type="email" id="email" required placeholder="name@company.com"

                    class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all text-sm font-semibold">

            </div>

           

            <div>

                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Password</label>

                <input type="password" id="password" required placeholder="••••••••"

                    class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all text-sm font-semibold">

            </div>



            <button type="submit"

                class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 active:translate-y-0 mt-4">

                CREATE SECURE ACCESS

            </button>

        </form>

       

        <div class="mt-8 pt-8 border-t border-slate-100">

            <p class="text-center text-xs font-bold text-slate-400 tracking-wide uppercase">

                Already have an account?

                <a href="/login" class="text-slate-900 hover:underline underline-offset-4 ml-1">Sign In instead</a>

            </p>

        </div>

    </div>



    <script>

        /**

         * Registration Logic

         * Submits user details to the IAM API

         */

        document.getElementById('register-form').onsubmit = async (e) => {

            e.preventDefault();

            const errorDiv = document.getElementById('error-msg');

            errorDiv.classList.add('hidden');



            const payload = {

                username: document.getElementById('username').value,

                email: document.getElementById('email').value,

                password: document.getElementById('password').value

            };



            try {

                const resp = await fetch('/api/v1/auth/register', {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify(payload)

                });



                const data = await resp.json();



                if (resp.ok) {

                    // Success feedback

                    const submitBtn = e.target.querySelector('button');

                    submitBtn.innerText = 'ACCOUNT CREATED!';

                    submitBtn.classList.replace('bg-slate-900', 'bg-emerald-500');



                    setTimeout(() => {

                        window.location.href = '/login'; // Redirect to login

                    }, 1000);

                } else {

                    // Validation errors (e.g. Identity already exists)

                    errorDiv.innerText = data.detail || "Registration failed";

                    errorDiv.classList.remove('hidden');

                }

            } catch (err) {

                errorDiv.innerText = "System error. Please try again later.";

                errorDiv.classList.remove('hidden');

                console.error("Registration Error:", err);

            }

        };



        // Redirect if already authenticated

        window.onload = () => {

            if (localStorage.getItem('token')) {

                window.location.href = '/';

            }

        };

    </script>

</body>

</html>
