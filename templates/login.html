<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FinTechHub</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-3xl border border-slate-200 shadow-2xl w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-bold text-xl mb-4">FH</div>
            <h2 class="text-3xl font-black text-slate-900">Sign In</h2>
        </div>

        <div id="error-msg" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-xl mb-6 text-xs font-bold text-center"></div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 text-sm font-semibold">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 text-sm font-semibold">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all shadow-lg mt-4">
                AUTHENTICATE SESSION
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 text-center text-xs font-bold text-slate-400">
            Don't have an account? <a href="/register" class="text-slate-900 hover:underline ml-1">Create one now</a>
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
