version: '3.9'

services:
  # 資料庫服務
  db:
    image: postgres:16
    container_name: opendatahub_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Azxs1226
      POSTGRES_DB: opendatahub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 搜尋引擎服務 
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: opendatahub_es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false  # 關閉安全驗證，解決你的連線報錯
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 限制記憶體，防止 OCI 伺服器當機
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  es_data: